version: '3.8'

services:
  # 后端API服务
  ai-agent-api:
    build: .
    container_name: ai-agent-api
    ports:
      - "8080:8000"
    environment:
      - SQLITE_DB_PATH=/data/ai_agent.db
      - PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
      # 可选：设置JWT密钥（生产环境应使用安全密钥）
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      # 可选：设置其他环境变量
      - PYTHONUNBUFFERED=1
    volumes:
      # 挂载数据库目录以持久化数据
      - ai-agent-data:/data
      # 开发模式：挂载源代码以便热重载
      - ./api:/app/api
      - ./engine:/app/engine
      - ./service:/app/service
    networks:
      - ai-agent-network
    restart: unless-stopped
    # 开发模式使用reload
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 可选：资源限制
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # 前端开发服务器
  ai-agent-frontend:
    build: ./frontend
    container_name: ai-agent-frontend
    ports:
      - "5174:5174"
    environment:
      # 设置API地址，使用服务名访问后端
      - VITE_API_URL=http://ai-agent-api:8000/api
      - CHOKIDAR_USEPOLLING=true  # 用于文件监控
    volumes:
      # 挂载前端源代码以便热重载
      - ./frontend:/app
      - /app/node_modules  # 避免覆盖容器内的node_modules
    networks:
      - ai-agent-network
    depends_on:
      - ai-agent-api
    restart: unless-stopped
    # 开发模式不需要健康检查
    # 可选：资源限制
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  ai-agent-data:
    name: ai-agent-data

networks:
  ai-agent-network:
    name: ai-agent-network
    driver: bridge